services:
  mariadb:
    image: docker.io/bitnami/mariadb:11.4
    environment:
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_drupal
      - MARIADB_DATABASE=bitnami_drupal
    healthcheck:
      test: ["CMD", "mariadb-admin" ,"ping", "-h", "localhost"]
      start_period: 20s
      interval: 20s
      timeout: 10s
      retries: 10
    volumes:
      - 'mariadb_data:/bitnami/mariadb'

  drupal:
    image: docker.io/bitnami/drupal:11
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - '8080:8080'
      - '8443:8443'
    environment:
      - DRUPAL_DATABASE_HOST=mariadb
      - DRUPAL_DATABASE_PORT_NUMBER=3306
      - DRUPAL_DATABASE_USER=bn_drupal
      - DRUPAL_DATABASE_NAME=bitnami_drupal
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes

    entrypoint:
      - /bin/bash
      - -xc
      - |
        sed -i "s|'port' => 3306,|'port' => '3306',|g" /opt/bitnami/drupal/sites/default/settings.php
        /opt/bitnami/scripts/drupal/entrypoint.sh /opt/bitnami/scripts/apache/run.sh
        sleep 9000
    volumes:
      - 'drupal_data:/bitnami/drupal'

volumes:
  mariadb_data:
    driver: local
  drupal_data:
    driver: local
