# ==============================================================================
# LiteLLM Configuration File
# ==============================================================================

# This section defines all the individual AI models this proxy can connect to.
# Each model has a custom 'model_name' that you will use in your API calls.
model_list:
  # --- Primary OpenAI Model ---
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      # --- SIMULATION STEP: Use an invalid key to force a 401 error ---
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      supports_vision: True
      base_model: "gpt-5"
      input_cost_per_token: 0.00000125 # $1.25 / 1M tokens
      output_cost_per_token: 0.00001 # $10.00 / 1M tokens

  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      supports_vision: True
      base_model: "gpt-5-mini"
      input_cost_per_token: 0.00000025 # $0.25 / 1M tokens
      output_cost_per_token: 0.000002 # $2.00 / 1M tokens

  # --- Expensive OpenAI Model ---
  # Your main, high-quality model.
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      # --- SIMULATION STEP: Use an invalid key to force a 401 error ---
      #api_key: "sk-expired-token-001"
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      supports_vision: True
      base_model: "gpt-4o"
      input_cost_per_token: 0.0000025 # $2.50 / 1M tokens
      output_cost_per_token: 0.00001 # $10.00 / 1M tokens

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      supports_vision: True
      base_model: "gpt-4o-mini"
      input_cost_per_token: 0.00000015 # $0.15 / 1M tokens
      output_cost_per_token: 0.0000006 # $0.60 / 1M tokens

  - model_name: gpt-4-turbo-vision
    litellm_params:
      model: openai/gpt-4-turbo-2024-04-09
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      supports_vision: True
      base_model: "gpt-4-turbo"
      input_cost_per_token: 0.00001
      output_cost_per_token: 0.00003

  - model_name: dall-e-3
    litellm_params:
      model: openai/dall-e-3
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      base_model: "dall-e-3"
      mode: "image_generation"

  # Your main, high-quality model.
  - model_name: gpt-4.1
    litellm_params:
      model: gpt-4.1
      # api_key: "sk-expired-token-001"
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      supports_vision: True

  - model_name: gpt-4.1-mini
    litellm_params:
      model: gpt-4.1-mini
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      supports_vision: True

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: gpt-3.5-turbo
      api_key: "os.environ/OPENAI_API_KEY"

  # --- NEW: OpenAI Embedding Model ---
  - model_name: openai-text-embedding-ada-002
    litellm_params:
      # Use a dedicated, low-cost embedding model like text-embedding-ada-002
      model: openai/text-embedding-ada-002
      api_key: "os.environ/OPENAI_API_KEY"
    model_info:
      mode: "embedding" # Explicitly marks this model for embedding tasks
      max_tokens: 8192 # Example context window size (check current model limits)
      input_cost_per_token: 0.00000010 # Example cost per 1K tokens

  # --- Google Gemini Model ---
  # A premium alternative model from Google.
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      supports_vision: True
      base_model: "gemini-2.5-pro"
      input_cost_per_token: 0.00000125 # $1.25 / 1M tokens
      output_cost_per_token: 0.00001 # $10.00 / 1M tokens

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      supports_vision: True
      base_model: "gemini-2.5-flash"
      input_cost_per_token: 0.0000003 # $0.30 / 1M tokens
      output_cost_per_token: 0.0000025 # $2.50 / 1M tokens

  # --- Image Generation Models ---
  - model_name: gemini-2.5-flash-image-preview
    litellm_params:
      model: gemini/gemini-2.5-flash-image-preview
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      base_model: "gemini-2.5-flash-image-preview"
      mode: "image_generation"
      # Pricing is per-image, not per-token.
      # This is equivalent to $0.039 per image.
      output_cost_per_token: 0.00003

  - model_name: imagen-4
    litellm_params:
      model: gemini/imagen-4
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      base_model: "imagen-4"
      mode: "image_generation"
      # Per-image pricing varies by quality.
      # Standard image is $0.04.

  - model_name: imagen-3
    litellm_params:
      model: gemini/imagen-3
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      base_model: "imagen-3"
      mode: "image_generation"
      # Per-image pricing is $0.03.

  # --- NEW: Gemini Embedding Model (via Google/Vertex AI) ---
  - model_name: gemini-text-embedding-004
    litellm_params:
      # Use the recommended Google embedding model (e.g., text-embedding-004)
      model: gemini/text-embedding-004
      api_key: "os.environ/GEMINI_API_KEY" # Or GOOGLE_API_KEY, depending on setup
      # If using Vertex AI, you may need additional params like api_base, project_id, and location
      # api_base: "https://<REGION>-aiplatform.googleapis.com"
      # api_version: "v1"
    model_info:
      mode: "embedding"
      base_model: "gemini-2.5"

  # --- Chained LiteLLM Proxy Model ---
  # This connects to ANOTHER LiteLLM proxy, treating it like a model.
  # This is useful for routing requests between different departments or environments.
  - model_name: anthropic.claude-sonnet-4
    litellm_params:
      # IMPORTANT: This must match a 'model_name' on your OTHER proxy's config.
      model: openai/anthropic.claude-sonnet-4
      # The API base URL of your second LiteLLM instance.
      api_base: "os.environ/LITELLM_GW_URL"
      # The master key for your OTHER LiteLLM proxy.
      api_key: "os.environ/LITELLM_API_KEY"
    model_info:
      base_model: "claude-4"
      # Pricing is speculative, based on provided links.
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015
      max_tokens: 200000 # Speculative

  - model_name: anthropic.claude-sonnet-3.7
    litellm_params:
      model: openai/anthropic.claude-3-7-sonnet
      api_base: "os.environ/LITELLM_GW_URL"
      api_key: "os.environ/LITELLM_API_KEY"
    model_info:
      base_model: "claude-3.7-sonnet"
      # Pricing is speculative, based on provided links.
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015
      max_tokens: 200000 # Speculative

  - model_name: anthropic.claude-sonnet-3.5
    litellm_params:
      model: openai/anthropic.claude-3-5-haiku
      api_base: "os.environ/LITELLM_GW_URL"
      api_key: "os.environ/LITELLM_API_KEY"
    model_info:
      base_model: "claude-3.5-sonnet"
      input_cost_per_token: 0.000003 # $3.00 / 1M tokens
      output_cost_per_token: 0.000015 # $15.00 / 1M tokens
      max_tokens: 200000

  # --- Ollama Local Model Deployment ---
  - model_name: ollama-mistral
    litellm_params:
      # Use the 'ollama/' prefix followed by the model name you pulled in Ollama (e.g., llama2, mistral, etc.) [5]
      model: ollama/mistral
      # The default API base for a local Ollama server [5, 6]
      api_base: "os.environ/OLLAMA_API_BASE"
      # Typically, no API key is required for local/Ollama instances, so it can be set to "none" [3].
      api_key: "none"

  - model_name: ollama-qwen3
    litellm_params:
      model: ollama/qwen3
      api_base: "os.environ/OLLAMA_API_BASE"
      api_key: "none"

  - model_name: ollama-gpt-oss
    litellm_params:
      model: ollama/gpt-oss
      api_base: "os.environ/OLLAMA_API_BASE"
      api_key: "none"

  - model_name: ollama-llama3.1
    litellm_params:
      model: ollama/llama3.1
      api_base: "os.environ/OLLAMA_API_BASE"
      api_key: "none"

  - model_name: ollama-mxbai-embed-large
    litellm_params:
      model: ollama/mxbai-embed-large
      api_base: "os.environ/OLLAMA_API_BASE"
      api_key: "none"
    model_info:
      mode: "embedding"
      input_cost_per_token: 0

  - model_name: ollama-nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: "os.environ/OLLAMA_API_BASE"
      api_key: "none"
    model_info:
      mode: "embedding"
      input_cost_per_token: 0

# ==============================================================================
# General Proxy Settings
# ==============================================================================

router_settings:
  # --- Model-Specific Fallback Chains (Router Setting) ---
  fallbacks:
    - gpt-5: # If the primary model gpt-5 fails...
        - gpt-4.1 # ...try gpt-4.1
    - gpt-4o: # If the primary model gpt-4o fails...
        - gpt-4.1 # ...try gpt-4.1
    - gpt-4.1: # If the primary model gpt-4.1 fails...
        - gpt-3.5-turbo # ...first, try GPT-3.5.
        - gemini-2.5-flash # ... then Gemini...
    - claude-sonnet-4: # If the primary model claude-sonnet-4 fails...
        - claude-sonnet-3.7 # ...try the previous version.
        - claude-sonnet-3.5 # ...try the previous version.
    - gemini-2.5-pro: # If the primary model claude-sonnet-4 fails...
        - claude-sonnet-4 # Use the second best one
        - gemini-2.5-flash # ...try the previous version.

  max_fallbacks: 5

general_settings:
  # Setting the default model for /v1/embeddings calls
  embedding_model: "openai-text-embedding-ada-002"
  store_prompts_in_spend_logs: true
  turn_off_message_logging: false # Explicitly ensures message content is logged to callbacks (default behavior)
  # success_callback: ["langfuse"] # Ensure a callback is enabled to receive the logs

litellm_settings:
  # It is also good practice to define a global fallback list here
  # for any model that lacks a specific router_settings fallback definition.
  default_fallbacks: ["gpt-3.5-turbo"]
  set_verbose: True

  cache: false # "true" requires pip install 'litellm[caching]'
  cache_params:
    # type: "memory"
    type: "disk"
    # Common Cache Settings:
    mode: "default_on" # Default is off
    ttl: 86400 # Setting a longer TTL for disk cache (e.g., 24 hours)
    supported_call_types:
      - "acompletion" # Cache chat completions (e.g., /v1/chat/completions)
      - "aembedding" # Cache embedding calls (e.g., /v1/embeddings)

# ==============================================================================
# Optional Server Settings
# ==============================================================================
server_settings:
  # Sets the port the proxy will run on.
  port: 4000
